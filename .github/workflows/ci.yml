name: CI

# The quality gate. Runs on every PR (into any branch) and on pushes to dev/main.
# All three jobs must pass before a PR can merge (enforced by branch protection —
# see scripts/setup-github-pipeline.sh). Nothing here touches a server.

on:
  pull_request:
  push:
    branches: [dev, main]
    paths:
      - "api-server/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR so we don't waste minutes on
# stale commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: api-server

jobs:
  # ── 1. Lint & format ──────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api-server/go.mod
          cache-dependency-path: api-server/go.sum
      - name: go vet
        run: go vet ./...
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files need formatting (run: make fmt)"
            echo "$unformatted"
            exit 1
          fi

  # ── 2. Tests (race detector + coverage) ───────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api-server/go.mod
          cache-dependency-path: api-server/go.sum
      - name: Run tests
        run: go test -race -count=1 ./...
      - name: Coverage summary
        run: |
          go test ./... -coverprofile=coverage.out
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -n 1 >> "$GITHUB_STEP_SUMMARY"

  # ── 3. Docker build check ─────────────────────────────────────────────────
  # Builds the real production image (no push). This is the check that catches
  # base-image / toolchain / dependency drift that `go build` on a dev machine
  # can miss — it must run on every PR.
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (verify it compiles, no push)
        uses: docker/build-push-action@v6
        with:
          context: api-server
          push: false
          tags: rides-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Integration tests (real Postgres + Redis) ──────────────────────────
  # The tier the unit suite can't be: spins up real Postgres (PostGIS) + Redis
  # service containers, applies the REAL migrations, and exercises the
  # repository/service layer with a real *pgxpool.Pool. This is what catches a
  # bad SQL query, a broken migration, or a violated DB constraint BEFORE it
  # reaches staging/prod — the mock-based unit tests cannot. Tests live in
  # api-server/test/dbit behind the `integration` build tag.
  integration:
    name: Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: rides
          POSTGRES_PASSWORD: rides
          POSTGRES_DB: rides_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rides -d rides_test"
          --health-interval 10s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api-server/go.mod
          cache-dependency-path: api-server/go.sum
      - name: Run DB-backed integration tests
        env:
          TEST_DATABASE_URL: postgres://rides:rides@localhost:5432/rides_test?sslmode=disable
          TEST_REDIS_URL: redis://localhost:6379
        run: go test -tags=integration -count=1 ./test/dbit/...
