name: Build & Push Image (GHCR)

# Builds the API Docker image and pushes it to the GitHub Container Registry
# (GHCR). This job is SAFE on its own — it only publishes an image, it does not
# touch the production box. The box only starts pulling this image once
# docker-compose.prod.yml is switched from `build:` to `image:` (see the
# CD workflow / DEPLOYMENT docs).
#
# Auth: the built-in GITHUB_TOKEN can push to GHCR when the job is granted
# `packages: write` — no personal access token is required to PUSH from Actions.
#
# Tags produced on each run:
#   ghcr.io/<owner>/rides-api:latest        (moving — newest main)
#   ghcr.io/<owner>/rides-api:<git-sha>     (immutable — used for rollback)

on:
  push:
    branches: [main]
    paths:
      - "api-server/**"
      - ".github/workflows/image.yml"
  workflow_dispatch: # build on demand from the Actions tab

jobs:
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # GHCR image paths must be lowercase; the org name is "Startup2Team".
      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/rides-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (linux/amd64 — matches the Vultr box)
        uses: docker/build-push-action@v6
        with:
          context: api-server
          file: api-server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          # Reuse layers across runs so only the changed binary layer rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Pushed:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.img.outputs.name }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.img.outputs.name }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  # Deploy runs AFTER the image is pushed (needs:) so the box can never pull a
  # tag that doesn't exist yet. The box pulls the prebuilt image — no Go
  # compilation on the production machine.
  #
  # On health failure we automatically restore the previously running image tag
  # (recorded before the swap). Manual rollback:
  #   ssh box 'cd /opt/rides/Rides-api/api-server && \
  #     API_IMAGE_TAG=<old-sha> docker compose -f docker-compose.prod.yml up -d --no-build --pull never api'
  deploy:
    name: Deploy to Vultr (pull image)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh-keyscan -H 139.84.251.242 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Record previous image tag (for auto-rollback)
        id: prev
        run: |
          SSH="ssh -i ~/.ssh/deploy -o BatchMode=yes root@139.84.251.242"
          prev=$($SSH "docker inspect api-server-api-1 --format '{{index .Config.Image}}' 2>/dev/null || true")
          # Strip registry prefix → tag only (e.g. 6a8103b8…)
          tag="${prev##*:}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Previous image tag: ${tag:-none}"

      - name: Sync tracked files + pull image + restart api
        run: |
          SSH="ssh -i ~/.ssh/deploy -o BatchMode=yes root@139.84.251.242"
          # Overlay tracked files (compose/nginx/migrations reference copy) —
          # ~2 MB now; keeps the box's .env + certs untouched.
          git archive --format=tar HEAD | $SSH 'tar -x -C /opt/rides/Rides-api --overwrite'
          # Pin the box to this commit's image and restart only the api service.
          $SSH "cd /opt/rides/Rides-api/api-server && \
                export API_IMAGE_TAG=${{ github.sha }} && \
                docker compose -f docker-compose.prod.yml pull api && \
                docker compose -f docker-compose.prod.yml up -d api && \
                docker image prune -f"

      - name: Verify health (auto-rollback on failure)
        run: |
          SSH="ssh -i ~/.ssh/deploy -o BatchMode=yes root@139.84.251.242"
          PREV_TAG="${{ steps.prev.outputs.tag }}"
          NEW_SHA="${{ github.sha }}"

          # Give the new container time to boot (or crash-loop).
          sleep 12
          code=$(curl -s -o /dev/null -w "%{http_code}" https://api.rides.rw/health || echo "000")
          echo "health: HTTP $code"

          if [ "$code" = "200" ]; then
            echo "Deploy healthy."
            exit 0
          fi

          echo "::error::Health check failed (HTTP $code). Rolling back to previous image."

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$NEW_SHA" ] || [ "$PREV_TAG" = "latest" ]; then
            echo "::error::No safe previous tag to restore (prev='${PREV_TAG}'). Manual intervention required."
            exit 1
          fi

          $SSH "cd /opt/rides/Rides-api/api-server && \
                docker stop api-server-api-1 || true; \
                docker rm api-server-api-1 || true; \
                export API_IMAGE_TAG=${PREV_TAG} && \
                docker compose -f docker-compose.prod.yml create --no-build api && \
                docker compose -f docker-compose.prod.yml start api"

          sleep 10
          rb=$(curl -s -o /dev/null -w "%{http_code}" https://api.rides.rw/health || echo "000")
          echo "rollback health: HTTP $rb"
          if [ "$rb" != "200" ]; then
            echo "::error::Rollback to ${PREV_TAG} also failed health (HTTP $rb)."
            exit 1
          fi
          echo "Rolled back to ${PREV_TAG} successfully — new deploy rejected."
          exit 1
