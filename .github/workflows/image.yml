name: Build & Push Image (GHCR)

# Builds the API Docker image and pushes it to the GitHub Container Registry
# (GHCR). This job is SAFE on its own — it only publishes an image, it does not
# touch the production box. The box only starts pulling this image once
# docker-compose.prod.yml is switched from `build:` to `image:` (see the
# CD workflow / DEPLOYMENT docs).
#
# Auth: the built-in GITHUB_TOKEN can push to GHCR when the job is granted
# `packages: write` — no personal access token is required to PUSH from Actions.
#
# Tags produced on each run:
#   ghcr.io/<owner>/rides-api:latest        (moving — newest main)
#   ghcr.io/<owner>/rides-api:<git-sha>     (immutable — used for rollback)

on:
  push:
    branches: [main]
    paths:
      - "api-server/**"
      - ".github/workflows/image.yml"
  workflow_dispatch: # build on demand from the Actions tab

jobs:
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # GHCR image paths must be lowercase; the org name is "Startup2Team".
      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/rides-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (linux/amd64 — matches the Vultr box)
        uses: docker/build-push-action@v6
        with:
          context: api-server
          file: api-server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          # Reuse layers across runs so only the changed binary layer rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Pushed:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.img.outputs.name }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.img.outputs.name }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
