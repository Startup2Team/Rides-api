name: CD

# Triggers after code lands on dev (→ staging) or main (→ production).
# Branch protection guarantees CI already passed before this runs.
#
# Required GitHub Secrets:
#   RAILWAY_TOKEN               — from railway.app → Account Settings → Tokens
#   RAILWAY_SERVICE_ID_STAGING  — Railway service ID for staging (dev branch)
#   RAILWAY_SERVICE_ID_PROD     — Railway service ID for production (main branch)

on:
  push:
    branches: [dev, main]
    paths:
      - "api-server/**"
      - ".github/workflows/cd.yml"

jobs:
  deploy:
    name: Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to staging (dev branch)
        if: github.ref_name == 'dev'
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID_STAGING }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy to production (main branch)
        if: github.ref_name == 'main'
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID_PROD }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
