name: CD (Vultr JNB)

# Continuous deployment to the production box in Johannesburg.
# On every push to main, GitHub SSHes into the server and runs the deploy
# script, which pulls both repos (Rides-api + Rides-web) and rebuilds the
# Docker stack. Replaces the old Railway pipeline.
#
# Required GitHub Secret:
#   DEPLOY_SSH_KEY — private SSH key trusted by root@139.84.251.242

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a deploy manually from the Actions tab

jobs:
  deploy:
    name: Deploy to Vultr (Johannesburg)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 139.84.251.242
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /opt/rides/deploy.sh
