name: Build Image

# Builds ONE immutable image per commit and pushes it to GHCR. This is the
# artifact that gets promoted unchanged through the environments:
#   push to dev  → :sha-<sha>  +  :dev
#   push to main → :sha-<sha>  +  :main
#   tag  vX.Y.Z  → :sha-<sha>  +  :vX.Y.Z  +  :latest
#
# The `sha-<sha>` tag is what staging and prod actually deploy, so "what CI
# built and tested" is byte-for-byte "what runs in prod". Rollback = redeploy a
# previous sha tag.
#
# Auth: built-in GITHUB_TOKEN with packages:write — no PAT needed.

on:
  push:
    branches: [dev, main]
    tags: ["v*"]
    paths:
      - "api-server/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false # never cancel a build whose image a deploy may want

jobs:
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/rides-api" >> "$GITHUB_OUTPUT"

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          # Raw full git SHA (matches the existing package convention + the
          # rollback commands in GHCR_DEPLOY.md), plus branch/semver/latest.
          tags: |
            type=sha,prefix=,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (multi-arch — amd64 for the box, arm64 for dev Macs)
        uses: docker/build-push-action@v6
        with:
          context: api-server
          file: api-server/Dockerfile
          # The Dockerfile cross-compiles (GOARCH=$TARGETARCH) so both arches
          # build fast from the native-amd64 runner — no toolchain emulation.
          # Result: the box pulls amd64, Apple-Silicon devs pull arm64, both native.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Pushed image" >> "$GITHUB_STEP_SUMMARY"
          echo "Immutable tag for promotion: \`${{ steps.img.outputs.name }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
