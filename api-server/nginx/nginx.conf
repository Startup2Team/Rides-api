worker_processes auto;

events {
    worker_connections 2048;
}

http {
    # ── WebSocket upgrade map ──────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN            always;
    add_header X-Content-Type-Options nosniff        always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Logging / perf ─────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
    sendfile on;
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    client_max_body_size 25M;   # driver document uploads (cap matches the API)

    # ── Real client IP from Cloudflare ─────────────────────────────────────
    # Cloudflare sits in front (proxied). Trust CF-Connecting-IP only from
    # Cloudflare's network. Refresh ranges from https://www.cloudflare.com/ips/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ── HTTP → HTTPS redirect (Cloudflare also does this) ──────────────────
    server {
        listen 80;
        server_name rides.rw www.rides.rw api.rides.rw admin.rides.rw;
        return 301 https://$host$request_uri;
    }

    # ── api.rides.rw → Go API ──────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name api.rides.rw;

        # Cloudflare Origin Certificate (wildcard *.rides.rw)
        ssl_certificate     /etc/nginx/certs/rides.rw.pem;
        ssl_certificate_key /etc/nginx/certs/rides.rw.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;   # WebSockets
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 3600s;   # long-lived tracking sockets
            proxy_send_timeout 3600s;
        }
    }

    # ── admin.rides.rw → Next.js admin (root goes straight to the dashboard) ──
    server {
        listen 443 ssl;
        http2 on;
        server_name admin.rides.rw;

        ssl_certificate     /etc/nginx/certs/rides.rw.pem;
        ssl_certificate_key /etc/nginx/certs/rides.rw.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # On the admin host, send the bare root to /admin — the app's auth gate
        # then shows the login if there's no session, or the dashboard if there is.
        location = / {
            return 302 /admin;
        }

        location / {
            proxy_pass         http://admin:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 60s;
        }
    }

    # ── rides.rw + www → public landing site (same Next app, served at /) ─────
    server {
        listen 443 ssl;
        http2 on;
        server_name rides.rw www.rides.rw;

        ssl_certificate     /etc/nginx/certs/rides.rw.pem;
        ssl_certificate_key /etc/nginx/certs/rides.rw.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://admin:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 60s;
        }
    }
}
