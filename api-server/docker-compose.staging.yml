# Staging stack — runs on the SAME Vultr box as prod, fully isolated:
#   • separate compose project (-p rides-staging) → own containers/volumes/network
#   • its own Postgres + Redis (own volumes) so a staging migration or data reset
#     can NEVER touch prod data
#   • api on 127.0.0.1:8090 (loopback only; nginx proxies stg-api.rides.rw to it)
#
# Deployed by: ./deploy/deploy.sh staging sha-<gitsha>
# Config lives in ./.env.staging on the box (copy of .env with staging values:
# distinct POSTGRES_DB, its own secrets, PAYMENTS_ENABLED=false, etc.).

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432" # distinct host port from prod's 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: >-
      redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data_staging:/data
    ports:
      - "127.0.0.1:6380:6379" # distinct host port from prod's 6379
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # Deploy pulls this exact tag (sha-<gitsha>); never built on the box.
    image: ghcr.io/startup2team/rides-api:${API_IMAGE_TAG:-dev}
    container_name: rides-staging-api
    restart: always
    env_file: .env.staging
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: "8080"
      ENV: staging
    ports:
      - "127.0.0.1:8090:8080" # loopback; nginx proxies stg-api.rides.rw here
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - default
      - rides-edge # shared with prod nginx so it can proxy stg-api.rides.rw

volumes:
  postgres_data_staging:
  redis_data_staging:

networks:
  # Created once on the box: `docker network create rides-edge`
  rides-edge:
    external: true
