
services:
  # ── PostgreSQL + PostGIS ───────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ride_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ride
      POSTGRES_PASSWORD: ride_secret
      POSTGRES_DB: rideplatform
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ride -d rideplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ride_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Local object storage for driver document development ───────────────────
  minio:
    image: minio/minio:latest
    container_name: ride_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ride_minio
      MINIO_ROOT_PASSWORD: ride_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ── pgAdmin 4 — PostgreSQL web UI ────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ride_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rides.rw
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin-pgpass:/pgpass:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ── Redis Commander — Redis web UI ────────────────────────────────────────
  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: ride_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "rides:redis:6379"
      HTTP_USER: admin
      HTTP_PASSWORD: admin123
    ports:
      - "8084:8081"
    depends_on:
      redis:
        condition: service_healthy

  # ── API Server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ride_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://ride:ride_secret@postgres:5432/rideplatform?sslmode=disable
      REDIS_URL: redis://redis:6379
      PORT: "8080"
    volumes:
      # Mount the real Firebase service account (gitignored) over the baked
      # placeholder so the FCM client initializes without a rebuild.
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Admin console (Next.js, from the Rides-web repo beside this one) ────────
  # Mirrors the prod box setup but points at the LOCAL api. Browser calls go to
  # localhost:8080 (baked at build time); server-side route handlers use the
  # compose-internal api:8080. Rebuild after pulling Rides-web changes:
  #   docker compose up -d --build admin
  # For active frontend editing prefer the hot-reload dev server instead:
  #   cd ../../Rides-web && pnpm dev   (with NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1)
  admin:
    build:
      context: ../../Rides-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    container_name: ride_admin
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_INTERNAL_URL: http://api:8080/api/v1
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pgadmin_data:
