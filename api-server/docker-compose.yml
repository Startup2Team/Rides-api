
services:
  # ── PostgreSQL + PostGIS ───────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ride_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ride
      POSTGRES_PASSWORD: ride_secret
      POSTGRES_DB: rideplatform
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ride -d rideplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ride_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Local object storage for driver document development ───────────────────
  minio:
    image: minio/minio:latest
    container_name: ride_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ride_minio
      MINIO_ROOT_PASSWORD: ride_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ── API Server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ride_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://ride:ride_secret@postgres:5432/rideplatform?sslmode=disable
      REDIS_URL: redis://redis:6379
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
volumes:
  postgres_data:
  redis_data:
  minio_data:
