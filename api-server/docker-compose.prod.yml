# Production compose — single Vultr (Johannesburg) box.
# Run FROM this directory:  /opt/rides/Rides-api/api-server
# Builds the API (this repo) and the admin (Rides-web repo) on the box.
#
# Layout expected on the server:
#   /opt/rides/Rides-api/api-server   (this dir — run compose here)
#   /opt/rides/Rides-web              (admin repo, deploy/docker branch)
#
# Required env in ./.env (copy .env.production.example):
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, REDIS_PASSWORD,
#   JWT_*, MOMO_*, STORAGE_*, AT_*, ADMIN_ORIGIN, ADMIN_API_URL, ...
#
# Run: docker compose -f docker-compose.prod.yml up -d --build

services:
  # ── PostgreSQL + PostGIS ───────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No port exposed — only reachable by other containers.

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No port exposed — only reachable by other containers.

  # ── API Server (Go) ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # No public port — Nginx proxies to api:8080 on the internal network.

  # ── Admin dashboard (Next.js, from the Rides-web repo) ─────────────────────
  admin:
    build:
      # Rides-web is cloned beside Rides-api: ../../Rides-web from here.
      context: ../../Rides-web
      dockerfile: Dockerfile
      args:
        # Baked into the browser bundle at build time.
        NEXT_PUBLIC_API_URL: ${ADMIN_API_URL:-https://api.rides.rw/api/v1}
    restart: always
    environment:
      # Server-side calls from Next route handlers stay on the internal network.
      BACKEND_ORIGIN: http://api:8080
      NODE_ENV: production
    depends_on:
      - api
    # No public port — Nginx proxies to admin:3000 on the internal network.

  # ── Nginx reverse proxy + TLS termination ─────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro    # Cloudflare Origin cert goes here
    depends_on:
      - api
      - admin

volumes:
  postgres_data:
  redis_data:
